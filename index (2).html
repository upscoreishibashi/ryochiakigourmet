<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>食べたいリスト 🍽️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<style>
  :root {
    --cream: #FAF7F2;
    --ink: #1A1612;
    --ink-muted: #6B635A;
    --ink-faint: #C4BDB5;
    --accent: #C84B2F;
    --accent-warm: #E8956D;
    --visited: #8B9E7A;
    --surface: #FFFFFF;
    --border: rgba(26,22,18,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); }

  /* ── Header ── */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: var(--ink);
  }
  .logo em { font-style: italic; color: var(--accent); }
  .header-stats {
    display: flex; gap: 20px; align-items: center;
  }
  .stat {
    text-align: right;
    line-height: 1.2;
  }
  .stat-num { font-size: 16px; font-weight: 500; color: var(--ink); }
  .stat-label { font-size: 10px; color: var(--ink-muted); letter-spacing: 0.05em; text-transform: uppercase; }

  /* ── Sidebar ── */
  #sidebar {
    position: fixed; top: 56px; left: 0; bottom: 0; z-index: 900;
    width: 320px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-top {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 10px;
  }
  .search-wrap {
    position: relative;
  }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--ink-muted); pointer-events: none;
  }
  #searchInput {
    width: 100%; padding: 8px 12px 8px 34px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--cream); font-size: 13px; font-family: inherit;
    color: var(--ink); outline: none;
  }
  #searchInput:focus { border-color: var(--accent); }
  .filter-row { display: flex; gap: 8px; }
  .filter-row select {
    flex: 1; padding: 7px 10px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--cream); font-size: 13px;
    font-family: inherit; color: var(--ink); outline: none; cursor: pointer;
  }
  .filter-row select:focus { border-color: var(--accent); }
  .visit-tabs { display: flex; gap: 4px; }
  .vtab {
    flex: 1; padding: 6px 0; font-size: 12px; border-radius: 6px;
    border: 1px solid var(--border); background: transparent;
    cursor: pointer; font-family: inherit; color: var(--ink-muted);
    transition: all .15s;
  }
  .vtab.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .vtab.active.visited-tab { background: var(--visited); border-color: var(--visited); }

  /* ── Restaurant list ── */
  #restaurantList {
    flex: 1; overflow-y: auto;
    padding: 8px 0;
  }
  #restaurantList::-webkit-scrollbar { width: 4px; }
  #restaurantList::-webkit-scrollbar-thumb { background: var(--ink-faint); border-radius: 2px; }
  .rest-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .1s;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .rest-item:hover { background: var(--cream); }
  .rest-item.active { background: #FFF5F3; }
  .rest-dot {
    width: 10px; height: 10px; border-radius: 50%;
    margin-top: 4px; flex-shrink: 0;
  }
  .rest-info { flex: 1; min-width: 0; }
  .rest-name {
    font-size: 14px; font-weight: 500; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .rest-sub { font-size: 12px; color: var(--ink-muted); margin-top: 2px; }
  .rest-badge {
    font-size: 10px; padding: 2px 7px; border-radius: 99px;
    border: 1px solid var(--border); color: var(--ink-muted);
    white-space: nowrap; flex-shrink: 0; margin-top: 2px;
  }
  .visited-check {
    font-size: 11px; color: var(--visited); margin-top: 2px;
    display: flex; align-items: center; gap: 3px;
  }
  .empty-msg {
    padding: 40px 16px; text-align: center;
    color: var(--ink-muted); font-size: 13px; line-height: 1.7;
  }

  /* ── Map ── */
  #map {
    position: fixed;
    top: 56px; left: 320px; right: 0; bottom: 0;
    z-index: 500;
  }

  /* ── Sheet input bar (bottom of sidebar) ── */
  .sheet-bar {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--cream);
  }
  .sheet-bar-label { font-size: 11px; color: var(--ink-muted); margin-bottom: 6px; letter-spacing: 0.03em; }
  .sheet-input-row { display: flex; gap: 6px; }
  #sheetUrl {
    flex: 1; padding: 7px 10px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 12px; font-family: inherit;
    color: var(--ink); background: var(--surface); outline: none;
  }
  #sheetUrl:focus { border-color: var(--accent); }
  #loadBtn {
    padding: 7px 12px; border-radius: 8px; border: none;
    background: var(--accent); color: #fff; font-size: 12px;
    font-family: inherit; font-weight: 500; cursor: pointer; white-space: nowrap;
  }
  #loadBtn:hover { background: #b03d24; }
  .sheet-msg { font-size: 11px; margin-top: 6px; color: var(--ink-muted); min-height: 14px; }
  .sheet-msg.ok { color: var(--visited); }
  .sheet-msg.err { color: var(--accent); }

  /* ── Popup ── */
  .leaflet-popup-content-wrapper {
    border-radius: 12px !important;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12) !important;
    border: 1px solid var(--border) !important;
    padding: 0 !important;
    overflow: hidden;
  }
  .leaflet-popup-content { margin: 0 !important; width: 260px !important; }
  .leaflet-popup-tip-container { display: none; }
  .popup-inner { padding: 16px; font-family: 'DM Sans', sans-serif; }
  .popup-genre-pill {
    display: inline-block; font-size: 10px; padding: 2px 8px;
    border-radius: 99px; border: 1px solid var(--border);
    color: var(--ink-muted); margin-bottom: 8px;
  }
  .popup-name { font-size: 16px; font-weight: 500; color: var(--ink); margin-bottom: 4px; font-family: 'Instrument Serif', serif; }
  .popup-meta { font-size: 12px; color: var(--ink-muted); line-height: 1.6; margin-bottom: 12px; }
  .popup-visited { font-size: 12px; margin-bottom: 10px; }
  .popup-visited.yes { color: var(--visited); }
  .popup-visited.no { color: var(--ink-muted); }
  .popup-links { display: flex; gap: 8px; }
  .popup-link {
    flex: 1; text-align: center; padding: 8px 0; border-radius: 8px;
    font-size: 12px; font-weight: 500; text-decoration: none;
    transition: opacity .15s;
  }
  .popup-link:hover { opacity: 0.8; }
  .link-insta { background: #FDE8D8; color: #8B3A1A; }
  .link-tabelog { background: #FDF2CC; color: #7A5A00; }
  .link-none { background: var(--cream); color: var(--ink-muted); border: 1px solid var(--border); pointer-events: none; }

  /* ── Loading overlay ── */
  #loading {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--cream);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
  }
  #loading.hidden { display: none; }
  .loading-logo { font-family: 'Instrument Serif', serif; font-size: 32px; color: var(--ink); }
  .loading-logo em { font-style: italic; color: var(--accent); }
  .loading-sub { font-size: 13px; color: var(--ink-muted); }

  /* ── Demo banner ── */
  #demoBanner {
    position: fixed; bottom: 16px; right: 16px; z-index: 1100;
    background: var(--ink); color: #fff;
    padding: 10px 16px; border-radius: 10px;
    font-size: 12px; line-height: 1.5; max-width: 240px;
    display: none;
  }
  #demoBanner.show { display: block; }
  #demoBanner strong { display: block; margin-bottom: 2px; }

  /* ── Mobile ── */
  @media (max-width: 680px) {
    #sidebar { width: 100%; top: auto; bottom: 0; height: 50vh; border-right: none; border-top: 1px solid var(--border); }
    #map { left: 0; bottom: 50vh; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loading-logo">食べたい<em>リスト</em></div>
  <div class="loading-sub">データを読み込んでいます…</div>
</div>

<header>
  <div class="logo">食べたい<em>リスト</em></div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="statTotal">—</div>
      <div class="stat-label">お店</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statVisited" style="color:var(--visited)">—</div>
      <div class="stat-label">訪問済み</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statRemaining" style="color:var(--accent)">—</div>
      <div class="stat-label">未訪問</div>
    </div>
  </div>
</header>

<div id="sidebar">
  <div class="sidebar-top">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="店名・駅・ジャンルで検索…" />
    </div>
    <div class="filter-row">
      <select id="genreFilter"><option value="">すべてのジャンル</option></select>
      <select id="areaFilter"><option value="">エリア全体</option></select>
    </div>
    <div class="visit-tabs">
      <button class="vtab active" data-v="all">すべて</button>
      <button class="vtab" data-v="unvisited">未訪問</button>
      <button class="vtab visited-tab" data-v="visited">訪問済み ✓</button>
    </div>
  </div>

  <div id="restaurantList"></div>

  <div class="sheet-bar">
    <div class="sheet-bar-label">Googleスプレッドシート URL</div>
    <div class="sheet-input-row">
      <input type="text" id="sheetUrl" placeholder="https://docs.google.com/spreadsheets/d/…" />
      <button id="loadBtn">読込</button>
    </div>
    <div class="sheet-msg" id="sheetMsg"></div>
  </div>
</div>

<div id="map"></div>
<div id="demoBanner"></div>

<script>
const SHEET_ID = '1T92c4aihpDbkhMfYqRMk17-Jlpvu8V0DVBQ928gLYYo';

const GENRE_COLORS = {
  'イタリアン':'#7C5CBF','フレンチ':'#D4537E','和食':'#C84B2F','寿司':'#185FA5',
  '焼鳥':'#BA7517','ラーメン':'#D85A30','カフェ':'#1D9E75','中華':'#E24B4A',
  '焼肉':'#993C1D','居酒屋':'#534AB7','スペイン料理':'#F0997B','タイ料理':'#1D9E75',
};
function genreColor(g){ return GENRE_COLORS[g] || '#888780'; }

const map = L.map('map',{zoomControl:false}).setView([35.6762,139.6503],12);
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CARTO', maxZoom:19
}).addTo(map);

let allData=[], markers=[], activeVisit='all', activeItem=null;

function makeIcon(r){
  const c = r.visited ? '#8B9E7A' : genreColor(r.genre);
  const inner = r.visited
    ? `<text x="12" y="16" text-anchor="middle" font-size="11" fill="white" font-family="sans-serif">✓</text>`
    : `<circle cx="12" cy="12" r="4" fill="white" fill-opacity="0.85"/>`;
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="24" height="32" viewBox="0 0 24 32">
    <path d="M12 0C6.48 0 2 4.48 2 10c0 7.5 10 22 10 22s10-14.5 10-22C22 4.48 17.52 0 12 0z" fill="${c}" opacity="${r.visited?0.55:1}"/>
    ${inner}
  </svg>`;
  return L.divIcon({html:svg,className:'',iconSize:[24,32],iconAnchor:[12,32],popupAnchor:[0,-34]});
}

function popupHtml(r){
  const vi = r.visited
    ? `<div class="popup-visited yes">✓ 訪問済み</div>`
    : `<div class="popup-visited no">○ 未訪問</div>`;
  const insta = r.insta
    ? `<a href="${r.insta}" class="popup-link link-insta" target="_blank">▶ Reel</a>`
    : `<span class="popup-link link-none">Reel なし</span>`;
  const tab = r.tabelog
    ? `<a href="${r.tabelog}" class="popup-link link-tabelog" target="_blank">食べログ</a>`
    : `<span class="popup-link link-none">食べログ なし</span>`;
  return `<div class="popup-inner">
    <div class="popup-genre-pill">${r.genre||'未分類'}</div>
    <div class="popup-name">${r.name}</div>
    <div class="popup-meta">${r.station ? '🚉 '+r.station+'<br>' : ''}${r.address||''}</div>
    ${vi}
    <div class="popup-links">${insta}${tab}</div>
  </div>`;
}

function renderAll(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const genre = document.getElementById('genreFilter').value;
  const area = document.getElementById('areaFilter').value;

  markers.forEach(m=>m.remove()); markers=[];
  const list = document.getElementById('restaurantList');
  list.innerHTML='';

  const filtered = allData.filter(r=>{
    if(!r.name) return false;
    if(activeVisit==='visited' && !r.visited) return false;
    if(activeVisit==='unvisited' && r.visited) return false;
    if(genre && r.genre!==genre) return false;
    if(area && r.station!==area) return false;
    if(q && !r.name.toLowerCase().includes(q) && !(r.station||'').toLowerCase().includes(q) && !(r.genre||'').toLowerCase().includes(q)) return false;
    return true;
  });

  if(filtered.length===0){
    list.innerHTML='<div class="empty-msg">条件に合うお店が<br>見つかりませんでした</div>';
  }

  const bounds=[];
  filtered.forEach(r=>{
    // list item
    const item = document.createElement('div');
    item.className='rest-item';
    item.innerHTML=`
      <div class="rest-dot" style="background:${r.visited?'#8B9E7A':genreColor(r.genre)}; opacity:${r.visited?0.55:1}"></div>
      <div class="rest-info">
        <div class="rest-name">${r.name}</div>
        <div class="rest-sub">${r.station||''}</div>
        ${r.visited?'<div class="visited-check">✓ 訪問済み</div>':''}
      </div>
      <div class="rest-badge">${r.genre||'—'}</div>
    `;
    list.appendChild(item);

    // marker
    if(!r.lat||!r.lng) return;
    const m=L.marker([r.lat,r.lng],{icon:makeIcon(r)}).addTo(map);
    m.bindPopup(popupHtml(r),{maxWidth:280,closeButton:false});
    markers.push(m);
    bounds.push([r.lat,r.lng]);

    item.addEventListener('click',()=>{
      document.querySelectorAll('.rest-item').forEach(el=>el.classList.remove('active'));
      item.classList.add('active');
      if(r.lat&&r.lng){ map.setView([r.lat,r.lng],15); m.openPopup(); }
    });
    m.on('click',()=>{
      document.querySelectorAll('.rest-item').forEach(el=>el.classList.remove('active'));
      item.classList.add('active');
      item.scrollIntoView({behavior:'smooth',block:'nearest'});
    });
  });

  if(bounds.length>1) map.fitBounds(bounds,{padding:[60,60],maxZoom:15});
  else if(bounds.length===1) map.setView(bounds[0],15);
}

function updateStats(){
  const total=allData.filter(r=>r.name).length;
  const visited=allData.filter(r=>r.name&&r.visited).length;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statVisited').textContent=visited;
  document.getElementById('statRemaining').textContent=total-visited;
}

function populateFilters(){
  const genres=[...new Set(allData.map(r=>r.genre).filter(Boolean))];
  const areas=[...new Set(allData.map(r=>r.station).filter(Boolean))];
  const gSel=document.getElementById('genreFilter');
  const aSel=document.getElementById('areaFilter');
  gSel.innerHTML='<option value="">すべてのジャンル</option>';
  aSel.innerHTML='<option value="">エリア全体</option>';
  genres.forEach(g=>{const o=document.createElement('option');o.value=g;o.textContent=g;gSel.appendChild(o);});
  areas.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;aSel.appendChild(o);});
}

function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2) return [];
  const headers=lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
  return lines.slice(1).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===','&&!inQ){vals.push(cur.trim());cur='';}
      else{cur+=line[i];}
    }
    vals.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>obj[h]=(vals[i]||'').replace(/"/g,'').trim());
    return {
      name:obj['店名']||'',address:obj['住所']||'',station:obj['最寄り駅']||'',
      genre:obj['ジャンル']||'',insta:obj['インスタ']||'',tabelog:obj['食べログ']||'',
      lat:parseFloat(obj['lat']||obj['緯度']||''),lng:parseFloat(obj['lng']||obj['経度']||''),
      visited:(obj['訪問済み']||'').toUpperCase()==='TRUE',
    };
  });
}

async function loadSheet(id){
  const url=`https://docs.google.com/spreadsheets/d/${id}/export?format=csv`;
  const res=await fetch(url);
  if(!res.ok) throw new Error('fetch failed');
  const text=await res.text();
  return parseCSV(text);
}

async function init(){
  const loading=document.getElementById('loading');
  const loadingSub=loading.querySelector('.loading-sub');
  try{
    loadingSub.textContent='スプレッドシートを読み込んでいます…';
    const data=await loadSheet(SHEET_ID);
    allData=data;
    populateFilters();updateStats();renderAll();
    loading.classList.add('hidden');
  } catch(e){
    loading.classList.add('hidden');
    document.getElementById('restaurantList').innerHTML='<div class="empty-msg">スプレッドシートを読み込めませんでした。<br>下のURLを確認して「読込」を押してください。</div>';
  }
}

// Events
document.getElementById('searchInput').addEventListener('input',renderAll);
document.getElementById('genreFilter').addEventListener('change',renderAll);
document.getElementById('areaFilter').addEventListener('change',renderAll);
document.querySelectorAll('.vtab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.vtab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeVisit=btn.dataset.v;
    renderAll();
  });
});
document.getElementById('loadBtn').addEventListener('click',async()=>{
  const url=document.getElementById('sheetUrl').value.trim();
  const match=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  const msg=document.getElementById('sheetMsg');
  if(!match){msg.textContent='URLの形式が正しくありません';msg.className='sheet-msg err';return;}
  msg.textContent='読み込み中…';msg.className='sheet-msg';
  try{
    const data=await loadSheet(match[1]);
    const real=data.filter(r=>r.name);
    if(real.length===0){msg.textContent='データが見つかりません。列名を確認してください。';msg.className='sheet-msg err';return;}
    allData=data;populateFilters();updateStats();renderAll();
    msg.textContent=`✓ ${real.length}件のお店を読み込みました`;msg.className='sheet-msg ok';
  } catch(e){
    msg.textContent='読み込みに失敗しました。公開設定を確認してください。';msg.className='sheet-msg err';
  }
});

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
